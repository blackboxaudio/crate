[package]
name = "crate-app"
version = "0.2.2-staging.1"
description = "Cross-platform DJ library manager with music discovery, track analysis, and USB export"
authors = ["you"]
edition = "2021"
license-file = "../LICENSE"

[lib]
name = "crate_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = []
devtools = ["tauri/devtools"]

[build-dependencies]
tauri-build = { version = "2.5.3", features = [] }

[dependencies]
# Tauri
tauri = { version = "2.10.2", features = ["protocol-asset"] }
tauri-plugin-opener = "2.5.3"
tauri-plugin-dialog = "2.6.0"
tauri-plugin-fs = "2.4.5"
tauri-plugin-clipboard-manager = "2.3.2"
tauri-plugin-window-state = "2.4.1"
tauri-plugin-updater = "2.10.0"
tauri-plugin-process = "2.3.1"
souvlaki = "0.8"
raw-window-handle = "0.6"

# Database
rusqlite = { version = "0.38.0", features = ["bundled-sqlcipher-vendored-openssl"] }

# Audio
rodio = "0.21.1"
symphonia = { version = "0.5.5", features = ["all"] }
lofty = "0.22.4"

# Audio analysis
stratum-dsp = "1.0"

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
binrw = "0.14.1"

# Async
tokio = { version = "1.48.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }

# Image processing
image = { version = "0.25.9", default-features = false, features = ["png", "jpeg", "webp"] }

# Hashing
blake3 = "1.8.2"

# HTTP client + proxy server
reqwest = { version = "0.12", features = ["json", "stream", "cookies"] }
axum = "0.7"

# Regex
regex = "1"

# Utilities
uuid = { version = "1.19.0", features = ["v4", "serde"] }
chrono = { version = "0.4.42", features = ["serde"] }
thiserror = "2.0.17"
log = "0.4.29"
env_logger = "0.11.8"
walkdir = "2.5.0"
sysinfo = "0.37.2"

# Random
rand = "0.9"

# Encoding
base64 = "0.22"

# Device Library Plus key deobfuscation
flate2 = "1.0"
base85 = "2.0"

